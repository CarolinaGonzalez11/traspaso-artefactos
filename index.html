<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Escaneo QR - DIPRESEC</title>

  <!-- ✅ ZXing Browser UMD correcto -->
  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/zxing-browser.min.js"></script>

  <style>
    body{
      font-family:system-ui;
      margin:0;
      background:#f6f7fb;
      color:#111827;
      font-size:18px;
    }

    header{
      background:white;
      border-bottom:1px solid #e6e8ef;
      padding:12px 14px;
      display:flex;
      align-items:center;
      gap:12px;
    }

    header img{
      width:46px;
      height:46px;
    }

    .wrap{
      padding:14px;
      max-width:780px;
      margin:0 auto;
    }

    .card{
      background:white;
      border:1px solid #e6e8ef;
      border-radius:14px;
      padding:14px;
      margin:12px 0;
    }

    .btn{
      border:0;
      border-radius:12px;
      padding:14px;
      font-size:18px;
      font-weight:800;
      width:100%;
      margin:8px 0;
      background:#0b4aa2;
      color:white;
    }

    .btn.light{
      background:white;
      color:#111827;
      border:1px solid #e6e8ef;
    }

    video{
      width:100%;
      border-radius:14px;
      background:black;
    }

    input, select{
      width:100%;
      padding:12px;
      font-size:18px;
      border-radius:12px;
      border:1px solid #e6e8ef;
      margin-top:8px;
    }

    label{
      font-weight:800;
      display:block;
      margin-top:12px;
    }

    .big{
      font-size:26px;
      font-weight:900;
      word-break:break-all;
    }

    .ok{
      color:#027a48;
      font-weight:900;
      white-space:pre-wrap;
    }

    .err{
      color:#b42318;
      font-weight:900;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>

<header>
  <img src="https://www.municipalidadmaipu.cl/img/escudo_maipu.32d4bc5a.png">
  <div>
    <div style="font-weight:900;color:#0b4aa2">Ilustre Municipalidad de Maipú</div>
    <div style="font-size:14px;color:#667085;font-weight:700">DIPRESEC · Escaneo QR</div>
  </div>
</header>

<div class="wrap">

  <div id="msg"></div>

  <div class="card">
    <button class="btn" onclick="startScanner()">📷 Iniciar escáner</button>
    <button class="btn light" onclick="stopScanner()">Cerrar cámara</button>

    <video id="video" playsinline></video>

    <div style="margin-top:12px">
      <div style="font-weight:900">Último QR detectado:</div>
      <div id="last" class="big">—</div>
    </div>
  </div>

</div>

<script>

let reader = null;
let active = false;

function show(text, type="ok"){
  const el = document.getElementById("msg");
  el.className = type;
  el.textContent = text;
}

async function startScanner(){
  try{

    if (!window.ZXingBrowser){
      show("ZXingBrowser no cargó. Puede estar bloqueado por red.", "err");
      return;
    }

    const video = document.getElementById("video");
    reader = new ZXingBrowser.BrowserMultiFormatReader();
    active = true;

    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === "videoinput");

    const deviceId = cams.length ? cams[cams.length - 1].deviceId : null;

    show("Abriendo cámara...", "ok");

    await reader.decodeFromVideoDevice(deviceId, video, (result, err) => {
      if (!active) return;

      if (result){
        const text = String(result.getText() || "").trim().toUpperCase();
        document.getElementById("last").textContent = text || "—";
      }
    });

    show("Escáner activo. Apunta al QR.", "ok");

  }catch(e){
    show("Error al abrir cámara:\n" + e.name + "\n" + e.message, "err");
  }
}

function stopScanner(){
  active = false;

  if (reader){
    try{ reader.reset(); }catch(e){}
    reader = null;
  }

  show("Cámara cerrada.", "ok");
}

</script>

</body>
</html>
